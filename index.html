<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雁君的食譜庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --warm-white: #fffdf8;
    --terracotta: #c4614a;
    --terracotta-light: #e8907c;
    --terracotta-dark: #9e4535;
    --sage: #7a9e7e;
    --sage-light: #b5cdb7;
    --charcoal: #2c2c2c;
    --warm-gray: #8a8278;
    --border: #e8ddd0;
    --gold: #c9973a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--charcoal);
    color: var(--cream);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    letter-spacing: 0.02em;
    color: var(--cream);
  }
  .logo span { color: var(--terracotta-light); }
  .header-actions { display: flex; gap: 12px; align-items: center; }

  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.4s;
    white-space: nowrap;
  }
  .sync-indicator.syncing { color: #f0c070; border-color: rgba(240,192,112,0.4); }
  .sync-indicator.ok      { color: #7dd87d; border-color: rgba(125,216,125,0.4); }
  .sync-indicator.err     { color: #ff8a80; border-color: rgba(255,138,128,0.4); }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .sync-indicator.syncing .sync-dot {
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }
  .btn-header-outline {
    background: transparent;
    color: var(--cream);
    border: 1.5px solid rgba(255,255,255,0.35);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-header-outline:hover { border-color: var(--terracotta-light); color: var(--terracotta-light); background: rgba(196,97,74,0.1); }

  /* LAYOUT */
  .app { display: flex; min-height: calc(100vh - 64px); }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--warm-white);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 8px; }
  .sidebar-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warm-gray);
    padding: 8px 24px 4px;
  }
  .category-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 24px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    color: var(--charcoal);
    text-align: left;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .category-btn:hover { background: rgba(196,97,74,0.08); }
  .category-btn.active {
    background: rgba(196,97,74,0.12);
    border-left-color: var(--terracotta);
    color: var(--terracotta-dark);
    font-weight: 500;
  }
  .cat-icon { font-size: 1.1rem; width: 20px; text-align: center; }
  .cat-count {
    margin-left: auto;
    background: var(--border);
    color: var(--warm-gray);
    font-size: 0.7rem;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .category-btn.active .cat-count {
    background: var(--terracotta);
    color: white;
  }

  /* MAIN */
  .main { flex: 1; padding: 32px; max-width: 100%; overflow: hidden; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 16px; }
  .page-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--charcoal);
  }
  .recipe-count {
    font-size: 0.8rem;
    color: var(--warm-gray);
    background: var(--border);
    padding: 3px 10px;
    border-radius: 12px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    flex: 1;
    max-width: 320px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--terracotta); }
  .search-box input {
    border: none;
    outline: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    background: transparent;
    width: 100%;
    color: var(--charcoal);
  }
  .search-icon { color: var(--warm-gray); font-size: 0.9rem; }

  .btn-primary {
    background: var(--terracotta);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary:hover { background: var(--terracotta-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(196,97,74,0.3); }

  .btn-secondary {
    background: white;
    color: var(--charcoal);
    border: 1.5px solid var(--border);
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--terracotta); color: var(--terracotta); }

  /* RECIPE GRID */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .recipe-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .recipe-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    border-color: var(--terracotta-light);
  }

  .card-photo {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: linear-gradient(135deg, var(--sage-light), var(--terracotta-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    position: relative;
    overflow: hidden;
  }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
  .card-cat-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(44,44,44,0.8);
    color: white;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
  }
  .card-cal-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(201,151,58,0.9);
    color: white;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }

  .card-body { padding: 16px; }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .card-meta {
    display: flex;
    gap: 12px;
    font-size: 0.78rem;
    color: var(--warm-gray);
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag {
    background: var(--cream);
    color: var(--warm-gray);
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--warm-gray);
  }
  .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Noto Serif TC', serif; font-size: 1.3rem; margin-bottom: 8px; color: var(--charcoal); }
  .empty-state p { font-size: 0.9rem; margin-bottom: 20px; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,20,20,0.6);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border-radius: 16px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 28px 0;
    position: sticky;
    top: 0;
    background: var(--warm-white);
    z-index: 10;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.3rem;
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--warm-gray);
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--border); color: var(--charcoal); }

  .modal-body { padding: 24px 28px; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--charcoal);
    letter-spacing: 0.02em;
  }
  .form-input, .form-select, .form-textarea {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--charcoal);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--terracotta);
  }
  .form-textarea { resize: vertical; min-height: 100px; }

  /* PHOTO UPLOAD */
  .photo-upload {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    position: relative;
  }
  .photo-upload:hover { border-color: var(--terracotta); background: rgba(196,97,74,0.03); }
  .photo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-upload .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .photo-upload p { font-size: 0.85rem; color: var(--warm-gray); }
  .photo-upload strong { color: var(--terracotta); }
  .photo-preview {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-remove {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(44,44,44,0.7);
    color: white;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* INGREDIENTS */
  .ingredients-list { display: flex; flex-direction: column; gap: 8px; }
  .ingredient-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 8px;
    align-items: center;
  }
  .btn-icon {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: all 0.15s;
    color: var(--warm-gray);
  }
  .btn-icon:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .btn-add-row {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 8px;
    width: 100%;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    color: var(--warm-gray);
    transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-add-row:hover { border-color: var(--terracotta); color: var(--terracotta); background: rgba(196,97,74,0.04); }

  /* CALORIE SECTION */
  .calorie-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cal-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .cal-card.main-cal {
    border-color: var(--gold);
    background: linear-gradient(135deg, #fff9ec, #fffdf8);
  }
  .cal-label { font-size: 0.7rem; color: var(--warm-gray); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .cal-value { font-size: 1.3rem; font-weight: 700; color: var(--charcoal); }
  .cal-unit { font-size: 0.65rem; color: var(--warm-gray); }
  .cal-card.main-cal .cal-value { color: var(--gold); font-size: 1.5rem; }

  /* SECTION DIVIDER */
  .section-divider {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    background: var(--warm-white);
    position: sticky;
    bottom: 0;
  }

  /* VIEW MODAL */
  .view-photo-main {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--sage-light), var(--terracotta-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    overflow: hidden;
    position: relative;
  }
  .view-photo-main img { width: 100%; height: auto; display: block; object-fit: contain; position: static; }

  .view-photo-strip { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
  .strip-thumb {
    width: 70px;
    height: 70px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--border);
  }
  .strip-thumb.active { border-color: var(--terracotta); }
  .strip-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .view-meta-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
  .view-meta-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--warm-gray); }
  .view-meta-item strong { color: var(--charcoal); }

  .view-calorie-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .vcal-item { flex: 1; text-align: center; }
  .vcal-label { font-size: 0.68rem; color: var(--warm-gray); letter-spacing: 0.05em; text-transform: uppercase; }
  .vcal-val { font-size: 1.2rem; font-weight: 700; color: var(--charcoal); }
  .vcal-val.highlight { color: var(--gold); font-size: 1.5rem; }

  .ingr-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .ingr-table th { text-align: left; padding: 8px 12px; background: var(--cream); font-size: 0.75rem; color: var(--warm-gray); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .ingr-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .ingr-table tr:last-child td { border-bottom: none; }

  .steps-list { display: flex; flex-direction: column; gap: 14px; }
  .step-item { display: flex; gap: 14px; align-items: flex-start; }
  .step-num {
    width: 28px;
    height: 28px;
    background: var(--terracotta);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-text { font-size: 0.9rem; line-height: 1.6; padding-top: 3px; }

  .action-row { display: flex; gap: 10px; margin-top: 24px; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
    .calorie-grid { grid-template-columns: 1fr 1fr; }
    .ingredient-row { grid-template-columns: 2fr 1fr auto; }
    .ingredient-row .unit-col { display: none; }
  }

  /* SELECT MODE */
  .select-bar {
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--charcoal);
    color: white;
    padding: 10px 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    animation: slideUp 0.2s ease;
  }
  .select-bar.active { display: flex; }
  .select-bar-label { font-size: 0.9rem; flex: 1; }
  .btn-danger {
    background: #c4614a;
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-danger:hover { background: #9e4535; }
  .btn-danger:disabled { background: #888; cursor: not-allowed; }
  .btn-select-all-bar {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 12px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.82rem;
    transition: background 0.15s;
  }
  .btn-select-all-bar:hover { background: rgba(255,255,255,0.25); }

  .recipe-card { position: relative; }
  .card-checkbox {
    display: none;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 24px;
    height: 24px;
    accent-color: var(--terracotta);
    cursor: pointer;
  }
  body.select-mode .card-checkbox { display: block; }
  body.select-mode .recipe-card { cursor: default; }
  body.select-mode .recipe-card:hover { transform: none; box-shadow: none; }
  body.select-mode .recipe-card.selected {
    outline: 2.5px solid var(--terracotta);
    box-shadow: 0 0 0 4px rgba(196,97,74,0.15);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">雁君的<span>食譜</span>庫</div>
    <div class="header-actions">
      <div class="sync-indicator" id="sync-indicator" title="雲端同步狀態">
        <div class="sync-dot"></div>
        <span id="sync-indicator-text">未同步</span>
      </div>
      <button class="btn-header-outline" onclick="exportRecipes()" title="匯出食譜">⬇ 匯出</button>
      <button class="btn-header-outline" onclick="document.getElementById('import-file-input').click()" title="匯入食譜">⬆ 匯入</button>
      <input type="file" id="import-file-input" accept=".xlsx,.csv,.json" style="display:none" onchange="importRecipes(this)">
      <button class="btn-header-outline" onclick="openSyncModal()" title="雲端同步">☁ 同步</button>
      <button class="btn-primary" onclick="openAddModal()">＋ 新增食譜</button>
    </div>
  </div>
</header>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let recipes = JSON.parse(localStorage.getItem('my-recipes') || '[]');
let currentCat = 'all';
let editingId = null;
let tempPhotos = [];
let selectedIds = new Set();

// ── SELECT MODE ──────────────────────────────────────────
function toggleSelectMode() {
  const isActive = document.body.classList.toggle('select-mode');
  const btn = document.getElementById('btn-select-mode');
  const bar = document.getElementById('select-bar');
  if (isActive) {
    btn.textContent = '✕ 結束選取';
    btn.style.borderColor = 'var(--terracotta)';
    btn.style.color = 'var(--terracotta)';
    bar.classList.add('active');
  } else {
    btn.textContent = '☑ 選取';
    btn.style.borderColor = '';
    btn.style.color = '';
    bar.classList.remove('active');
    selectedIds.clear();
  }
  renderCards();
  updateSelectBar();
}

function handleCardClick(e, id) {
  if (document.body.classList.contains('select-mode')) {
    toggleCardSelect(id);
  } else {
    viewRecipe(id);
  }
}

function toggleCardSelect(id, cb) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
  } else {
    selectedIds.add(id);
  }
  // Update card appearance without full re-render
  const card = document.querySelector(`.recipe-card[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('selected', selectedIds.has(id));
    const checkbox = card.querySelector('.card-checkbox');
    if (checkbox) checkbox.checked = selectedIds.has(id);
  }
  updateSelectBar();
}

function updateSelectBar() {
  const n = selectedIds.size;
  document.getElementById('select-bar-label').textContent = `已選 ${n} 道`;
  document.getElementById('btn-delete-selected').disabled = n === 0;
}

function selectAllVisible() {
  getFiltered().forEach(r => selectedIds.add(r.id));
  renderCards();
  updateSelectBar();
}

function deselectAll() {
  selectedIds.clear();
  renderCards();
  updateSelectBar();
}

function deleteSelected() {
  if (!selectedIds.size) return;
  const names = recipes.filter(r => selectedIds.has(r.id)).map(r => r.name);
  const msg = selectedIds.size === 1
    ? `確定要刪除「${names[0]}」嗎？`
    : `確定要刪除以下 ${selectedIds.size} 道食譜嗎？\n\n${names.slice(0,10).join('、')}${names.length > 10 ? `… 等` : ''}`;
  if (!confirm(msg)) return;
  recipes = recipes.filter(r => !selectedIds.has(r.id));
  selectedIds.clear();
  save();
  updateCounts();
  renderCards();
  updateSelectBar();
}

const CATEGORY_EMOJI = {
  '中式-湯品':'🍲','中式-青菜':'🥬','中式-豆腐':'🫘','中式-蛋類':'🥚','中式-米麵':'🍜','中式-甜點':'🍡',
  '西式-前菜':'🥗','西式-主菜':'🥩','西式-湯品':'🍵','西式-甜點':'🍰','西式-麵包':'🍞','西式-麵食':'🍝',
  '醃漬類':'🫙','其他':'📌'
};

function save() {
  try {
    localStorage.setItem('my-recipes', JSON.stringify(recipes));
    return true;
  } catch(e) {
    alert('❌ 儲存失敗！\n\n可能原因：照片檔案太大，超過瀏覽器儲存上限（約 5MB）。\n\n建議：減少照片數量，或使用較小的圖片檔案。');
    return false;
  }
}

function editRecipeById(id) {
  const r = recipes.find(r => r.id === id);
  if (r) openAddModal(r);
}

function updateCounts() {
  const all = document.getElementById('cnt-all');
  if (all) all.textContent = recipes.length;
  const cats = ['中式-湯品','中式-青菜','中式-豆腐','中式-蛋類','中式-米麵','中式-甜點','西式-前菜','西式-主菜','西式-湯品','西式-甜點','西式-麵包','西式-麵食','醃漬類','其他'];
  cats.forEach(c => {
    const el = document.getElementById('cnt-' + c);
    if (el) el.textContent = recipes.filter(r => r.cat === c).length;
  });
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const sort = document.getElementById('sort-select').value;
  let list = recipes.filter(r => {
    const catOk = currentCat === 'all' || r.cat === currentCat;
    if (!catOk) return false;
    if (!q) return true;
    const haystack = (r.name + r.cat + (r.ingredients||[]).map(i=>i.name).join(' ')).toLowerCase();
    return haystack.includes(q);
  });
  if (sort === 'name') list.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  else if (sort === 'cal-asc') list.sort((a,b) => (a.cal||0)-(b.cal||0));
  else if (sort === 'cal-desc') list.sort((a,b) => (b.cal||0)-(a.cal||0));
  else list.sort((a,b) => (b.id||0)-(a.id||0));
  return list;
}

function renderCards() {
  const grid = document.getElementById('recipe-grid');
  const list = getFiltered();
  document.getElementById('recipe-count-label').textContent = list.length + ' 道';
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🍳</div>
      <h3>還沒有食譜</h3>
      <p>點擊「新增食譜」開始建立你的食譜庫</p>
    </div>`;
    return;
  }
  const isSelectMode = document.body.classList.contains('select-mode');
  grid.innerHTML = list.map(r => {
    const photoHtml = r.photos && r.photos.length ? `<img src="${r.photos[0]}" alt="${r.name}">` : '';
    const emoji = CATEGORY_EMOJI[r.cat] || '🍽️';
    return `<div class="recipe-card${isSelectMode && selectedIds.has(r.id) ? ' selected' : ''}" data-id="${r.id}" onclick="handleCardClick(event, ${r.id})">
      <div class="card-photo">
        ${emoji}
        ${photoHtml}
        <input type="checkbox" class="card-checkbox" data-id="${r.id}" ${selectedIds.has(r.id) ? 'checked' : ''} onclick="event.stopPropagation();toggleCardSelect(${r.id}, this)">
        <div class="card-cat-badge">${r.cat}</div>
        ${r.cal ? `<div class="card-cal-badge">🔥 ${r.cal} kcal</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${r.name}</div>
        <div class="card-meta">
          ${r.servings ? `<span>👥 ${r.servings} 人份</span>` : ''}
          ${r.time ? `<span>⏱️ ${r.time} 分鐘</span>` : ''}
          ${r.level ? `<span>${r.level === '簡單' ? '🟢' : r.level === '中等' ? '🟡' : '🔴'} ${r.level}</span>` : ''}
        </div>
        ${r.ingredients && r.ingredients.length ? `<div class="card-tags">${r.ingredients.slice(0,4).map(i=>`<span class="tag">${i.name}</span>`).join('')}${r.ingredients.length > 4 ? `<span class="tag">+${r.ingredients.length-4}</span>` : ''}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titles = {
    'all':'所有食譜',

function getIngredients() {
  const rows = document.querySelectorAll('#ingredients-list .ingredient-row');
  return Array.from(rows).map(r => {
    const inputs = r.querySelectorAll('input');
    return { name: inputs[0].value.trim(), amount: inputs[1].value.trim(), unit: inputs[2].value.trim() };
  }).filter(i => i.name);
}

// Photos
function compressImage(file, maxWidth = 1200, quality = 0.75) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = url;
  });
}

function handlePhotos(input) {
  const files = Array.from(input.files);
  files.forEach(async file => {
    const compressed = await compressImage(file);
    tempPhotos.push(compressed);
    renderPhotoPreview();
  });
  input.value = '';
}

function renderPhotoPreview() {
  const preview = document.getElementById('photo-preview');
  preview.innerHTML = tempPhotos.map((p, i) => `
    <div class="preview-item">
      <img src="${p}" alt="photo ${i+1}">
      <button class="preview-remove" onclick="removePhoto(${i})">✕</button>
    </div>`).join('');
}

function removePhoto(i) {
  tempPhotos.splice(i, 1);
  renderPhotoPreview();
}

// Modal
function openAddModal(recipe = null) {
  editingId = recipe ? recipe.id : null;
  document.getElementById('modal-add-title').textContent = recipe ? '編輯食譜' : '新增食譜';
  document.getElementById('f-name').value = recipe?.name || '';
  document.getElementById('f-cat').value = recipe?.cat || '中式-湯品';
  document.getElementById('f-servings').value = recipe?.servings || '';
  document.getElementById('f-time').value = recipe?.time || '';
  document.getElementById('f-level').value = recipe?.level || '簡單';
  document.getElementById('f-steps').value = recipe?.steps || '';
  document.getElementById('f-cal').value = recipe?.cal || '';
  document.getElementById('f-protein').value = recipe?.protein || '';
  document.getElementById('f-carbs').value = recipe?.carbs || '';
  document.getElementById('f-fat').value = recipe?.fat || '';
  document.getElementById('f-notes').value = recipe?.notes || '';
  document.getElementById('ingredients-list').innerHTML = '';
  (recipe?.ingredients || []).forEach(i => addIngredientRow(i.name, i.amount, i.unit));
  if (!recipe?.ingredients?.length) addIngredientRow();
  tempPhotos = recipe?.photos ? [...recipe.photos] : [];
  renderPhotoPreview();
  document.getElementById('modal-add').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('請輸入食譜名稱！'); return; }
  const recipe = {
    id: editingId || Date.now(),
    name,
    cat: document.getElementById('f-cat').value,
    servings: document.getElementById('f-servings').value,
    time: document.getElementById('f-time').value,
    level: document.getElementById('f-level').value,
    ingredients: getIngredients(),
    steps: document.getElementById('f-steps').value.trim(),
    cal: Number(document.getElementById('f-cal').value) || 0,
    protein: Number(document.getElementById('f-protein').value) || 0,
    carbs: Number(document.getElementById('f-carbs').value) || 0,
    fat: Number(document.getElementById('f-fat').value) || 0,
    notes: document.getElementById('f-notes').value.trim(),
    photos: [...tempPhotos],
  };
  if (editingId) {
    const idx = recipes.findIndex(r => r.id === editingId);
    if (idx >= 0) recipes[idx] = recipe;
  } else {
    recipes.push(recipe);
  }
  save();
  updateCounts();
  renderCards();
  closeModal('modal-add');
}

  ];

  const rows = toExport.map(r => {
    // 食材：格式為「食材名稱 份量 單位」每項用換行分隔
    const ingrText = (r.ingredients && r.ingredients.length)
      ? r.ingredients.map(i => [i.name, i.amount, i.unit].filter(x=>x).join(' ')).join('\n')
      : '';

    // 步驟：移除前綴「步驟N：」，保留純文字，每步一行
    const stepsText = r.steps
      ? r.steps.split('\n').filter(s=>s.trim()).map((s,i) =>
          `${i+1}. ${s.replace(/^步驟\d+[：:]\s*/,'')}`
        ).join('\n')
      : '';

    return [
      r.name, r.cat, r.servings||'', r.time||'', r.level||'',
      r.cal||'', r.protein||'', r.carbs||'', r.fat||'',
      ingrText, stepsText, r.notes||''
    ];
  });

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [22,14,8,8,8,10,10,10,8,30,50,30].map(w=>({wch:w}));

  // 設定有食材/步驟的欄位自動換行
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = 1; R <= range.e.r; R++) {
    ['J','K'].forEach(col => {
      const cell = ws[`${col}${R+1}`];
      if (cell) cell.s = { alignment: { wrapText: true, vertical: 'top' } };
    });
  }

  XLSX.utils.book_append_sheet(wb, ws, '食譜總覽');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `雁君食譜庫_${date}.xlsx`);
  closeModal('modal-export');
}

function doExportJson() {
  const selectedIds = new Set(
    Array.from(document.querySelectorAll('.export-cb:checked')).map(cb => Number(cb.value))
  );
  const toExport = recipes.filter(r => selectedIds.has(r.id));
  if (!toExport.length) { alert('請至少選擇一道食譜！'); return; }
  const data = JSON.stringify({ version: 2, exported: new Date().toISOString(), recipes: toExport }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `雁君食譜庫_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeModal('modal-export');
}

// ── CLOUD SYNC (Google Sheets) ──────────────────────────
const GS_URL = 'https://script.google.com/macros/s/AKfycbzlaHE2lki6YLQOu1jsWehUq0hTyOByd_xfNHHcBliIiKaHk9tDlKFuuYc5i0ySzrtzjg/exec';

function setIndicator(state, text) {
  const el  = document.getElementById('sync-indicator');
  const txt = document.getElementById('sync-indicator-text');
  el.className  = 'sync-indicator ' + state;
  txt.textContent = text;
}

function setSyncStatus(msg, type) {
  const el = document.getElementById('sync-status');
  el.innerHTML = msg;
  el.style.display = 'block';
  el.style.background = type === 'ok' ? '#edf7ed' : type === 'err' ? '#fdecea' : '#fdf6ec';
  el.style.color      = type === 'ok' ? '#2e7d32' : type === 'err' ? '#c62828' : '#555';
  el.style.border     = 'none';
}

function openSyncModal() {
  document.getElementById('sync-status').style.display = 'none';
  document.getElementById('modal-sync').classList.add('open');
}

async function syncUpload() {
  setIndicator('syncing', '同步中…');
  setSyncStatus('上傳中，請稍候…', 'info');
  try {
    const res = await fetch(GS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ recipes })
    });
    const data = await res.json();
    if (data.ok) {
      const now = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
      setIndicator('ok', `已同步 ${now}`);
      setSyncStatus(`✅ 上傳成功！共 ${data.count} 道食譜已同步至雲端`, 'ok');
    } else {
      setIndicator('err', '同步失敗');
      setSyncStatus('❌ 上傳失敗：' + (data.error || '未知錯誤'), 'err');
    }
  } catch(err) {
    setIndicator('err', '連線失敗');
    setSyncStatus('❌ 連線失敗，請確認網路或 Apps Script 部署狀態', 'err');
  }
}

async function syncDownload() {
  setIndicator('syncing', '載入中…');
  setSyncStatus('從雲端載入中，請稍候…', 'info');
  try {
    const res = await fetch(GS_URL);
    const data = await res.json();
    if (!data.ok) { 
      setIndicator('err', '載入失敗');
      setSyncStatus('❌ 載入失敗：' + (data.error || '未知錯誤'), 'err'); 
      return; 
    }
    const incoming = data.recipes || [];
    if (!incoming.length) {
      setIndicator('ok', '雲端無資料');
      setSyncStatus('雲端目前沒有食譜資料', 'info'); 
      return; 
    }

    const existingNames = new Set(recipes.map(r => r.name));
    const toAdd    = incoming.filter(r => !existingNames.has(r.name));
    const toUpdate = incoming.filter(r =>  existingNames.has(r.name));

    let proceed = true;
    if (toUpdate.length) {
      proceed = confirm(`從雲端找到 ${incoming.length} 道食譜
• 新增 ${toAdd.length} 道
• ${toUpdate.length} 道同名

是否覆蓋同名食譜？
（取消則只新增不覆蓋）`);
    }
    if (proceed && toUpdate.length) {
      toUpdate.forEach(r => {
        const idx = recipes.findIndex(x => x.name === r.name);
        if (idx >= 0) recipes[idx] = { ...r, id: recipes[idx].id, photos: recipes[idx].photos };
      });
    }
    recipes.push(...toAdd);
    save(); updateCounts(); renderCards();

    const now = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
    setIndicator('ok', `已同步 ${now}`);
    setSyncStatus(`✅ 載入成功！新增 ${toAdd.length} 道${proceed && toUpdate.length ? `，更新 ${toUpdate.length} 道` : ''}食譜`, 'ok');
  } catch(err) {
    setIndicator('err', '連線失敗');
    setSyncStatus('❌ 連線失敗，請確認網路狀態', 'err');
  }
}
// ── IMPORT ──────────────────────────────────────────────
function importRecipes(input) {
  const file = input.files[0];
  if (!file) return;
  const isJson = file.name.toLowerCase().endsWith('.json');
  const isCsv = file.name.toLowerCase().endsWith('.csv');
  const reader = new FileReader();

  // ── JSON import path ──
  if (isJson) {
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const incoming = Array.isArray(data) ? data : (data.recipes || []);
        if (!incoming.length) { alert('檔案中沒有找到食譜資料！'); input.value=''; return; }

        const existingNames = new Set(recipes.map(r => r.name));
        const toAdd = incoming.filter(r => !existingNames.has(r.name));
        const toUpdate = incoming.filter(r => existingNames.has(r.name));

        let proceed = true;
        if (toUpdate.length) {
          proceed = confirm(`找到 ${incoming.length} 道食譜：\n• ${toAdd.length} 道新食譜將新增\n• ${toUpdate.length} 道與現有食譜同名\n\n是否覆蓋同名食譜（含照片）？`);
        }
        if (proceed && toUpdate.length) {
          toUpdate.forEach(r => {
            const idx = recipes.findIndex(x => x.name === r.name);
            if (idx >= 0) recipes[idx] = r;
          });
        }
        recipes.push(...toAdd);
        save(); updateCounts(); renderCards();
        alert(`✅ 匯入完成！\n新增 ${toAdd.length} 道${proceed && toUpdate.length ? `，更新 ${toUpdate.length} 道` : ''}食譜。`);
      } catch(err) {
        alert('JSON 檔案格式錯誤：' + err.message);
      }
      input.value = '';
    };
    reader.readAsText(file, 'UTF-8');
    return;
  }

  reader.onload = e => {
    try {
      let wb;
      if (isCsv) {
        wb = XLSX.read(e.target.result, { type: 'string', raw: false });
      } else {
        wb = XLSX.read(e.target.result, { type: 'array' });
      }

      // 讀取「食譜總覽」工作表（Excel）或第一個工作表（CSV）
      const sheetName = wb.SheetNames.includes('食譜總覽') ? '食譜總覽' : wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      if (!ws) { alert('找不到工作表，請確認檔案格式正確。'); input.value=''; return; }

      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { alert('檔案中沒有找到資料！'); input.value=''; return; }

      const incoming = rows.map(row => {
        const name = String(row['食譜名稱'] || row['名稱'] || '').trim();
        if (!name) return null;

        // 解析食材：每行格式為「食材名稱 份量 單位」
        const ingrRaw = String(row['食材清單'] || row['食材'] || '').trim();
        const ingredients = ingrRaw
          ? ingrRaw.split('\n').map(line => {
              line = line.trim();
              if (!line) return null;
              const parts = line.split(/\s+/);
              return { name: parts[0]||line, amount: parts[1]||'', unit: parts[2]||'' };
            }).filter(Boolean)
          : [];

        // 解析步驟：每行為一個步驟，去掉「1. 」前綴
        const stepsRaw = String(row['烹調步驟'] || row['步驟'] || '').trim();
        const stepsStr = stepsRaw
          ? stepsRaw.split('\n').filter(s=>s.trim()).map((s,i) =>
              `步驟${i+1}：${s.replace(/^\d+[\.。]\s*/,'').trim()}`
            ).join('\n')
          : '';

        return {
          id: Date.now() + Math.random(),
          name,
          cat: String(row['分類'] || '其他').trim(),
          servings: row['份量(人)'] || row['份量'] || '',
          time: row['時間(分)'] || row['時間'] || '',
          level: String(row['難易度'] || '簡單').trim(),
          cal: Number(row['熱量(kcal)'] || row['熱量'] || 0) || 0,
          protein: Number(row['蛋白質(g)'] || row['蛋白質'] || 0) || 0,
          carbs: Number(row['碳水(g)'] || row['碳水化合物'] || 0) || 0,
          fat: Number(row['脂肪(g)'] || row['脂肪'] || 0) || 0,
          notes: String(row['備註'] || '').trim(),
          ingredients,
          steps: stepsStr,
          photos: []
        };
      }).filter(Boolean);

      if (!incoming.length) { alert('找不到有效的食譜資料，請確認欄位名稱正確。'); input.value=''; return; }

      const existingNames = new Set(recipes.map(r => r.name));
      const toAdd = incoming.filter(r => !existingNames.has(r.name));
      const toUpdate = incoming.filter(r => existingNames.has(r.name));

      let proceed = true;
      if (toUpdate.length) {
        proceed = confirm(`找到 ${incoming.length} 道食譜：\n• ${toAdd.length} 道新食譜將新增\n• ${toUpdate.length} 道與現有食譜同名\n\n是否覆蓋同名食譜？\n（取消則只新增不覆蓋）`);
      }

      if (proceed && toUpdate.length) {
        toUpdate.forEach(r => {
          const idx = recipes.findIndex(x => x.name === r.name);
          if (idx >= 0) recipes[idx] = { ...r, id: recipes[idx].id, photos: recipes[idx].photos };
        });
      }
      recipes.push(...toAdd);
      save();
      updateCounts();
      renderCards();
      alert(`✅ 匯入完成！\n新增 ${toAdd.length} 道${proceed && toUpdate.length ? `，更新 ${toUpdate.length} 道` : ''}食譜。`);
    } catch(err) {
      alert('檔案讀取失敗，請確認格式正確。\n錯誤：' + err.message);
    }
    input.value = '';
  };

  if (isCsv) {
    reader.readAsText(file, 'UTF-8');
  } else {
    reader.readAsArrayBuffer(file);
  }
}
